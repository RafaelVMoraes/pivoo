name: Supabase schema drift

on:
  pull_request:
    paths:
      - 'supabase/migrations/**'
      - 'supabase/schema.sql'
      - 'src/integrations/supabase/types.ts'
      - '.github/workflows/supabase-schema-drift.yml'
  workflow_dispatch:

jobs:
  drift-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Start local Supabase stack
        run: supabase start

      - name: Apply migrations from scratch
        run: supabase db reset --local --no-seed

      - name: Dump resulting schema
        run: supabase db dump --local --schema public --file supabase/schema.generated.sql

      - name: Check for drift in snapshot/types
        run: |
          supabase gen types typescript --local --schema public > src/integrations/supabase/types.ts
          git diff --exit-code -- src/integrations/supabase/types.ts
